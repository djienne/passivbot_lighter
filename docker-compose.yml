services:
  passivbot-lighter-live:
    build:
      context: .
      dockerfile: Dockerfile_live
    image: passivbot-lighter:latest
    container_name: passivbot-lighter-live
    restart: unless-stopped
    volumes:
      - ./:/app/
    working_dir: /app
    command: python src/main.py configs/hype_top.json
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
